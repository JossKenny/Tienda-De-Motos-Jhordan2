<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas - Full Motos Bolivia</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/formularios.css">
    <style>
        .form-card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .form-card h2 { margin-bottom: 15px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; }
        .input-group input, .input-group select { width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
        .ventas-lista { margin-top: 20px; }
        .venta-item { padding: 10px; border-left: 5px solid #ff3b3b; background: #f9f9f9; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="../imagenes/logo.png" alt="Full Motos Bolivia">
        </div>
        <nav>
                      <ul>
                <li><a href="inicio.html">Inicio</a></li>
                <li><a href="nosotros.html">Nosotros</a></li>
                <li><a href="perfil.html">Perfil</a></li>
                <li><a href="tienda.html">Tienda</a></li>
                <li><a href="categorias.html">Categorías</a></li>
                <li><a href="ofertas.html">Ofertas</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="configuracion.html">Configuración</a></li>
                <li><a href="producto.html">Producto</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="mapa.html">Mapa</a></li>
                <li><a href="#" id="logoutBtn">Cerrar sesión</a></li>
            </ul>  </nav>
    </aside>

    <main class="main-content">
        <h1>Ventas</h1>

        <div class="form-card">
            <h2>Registrar venta</h2>
            <form id="formVentas">
                <div class="input-group">
                    <label>Producto</label>
                    <select id="vProducto">
                        <option value="">Seleccione un producto</option>
                        <option value="Casco">Casco</option>
                        <option value="Aceite">Aceite y lubricantes</option>
                        <option value="Accesorios">Accesorios</option>
                        <option value="Ropa">Ropa de moto</option>
                        <option value="Neumáticos">Neumáticos</option>
                        <option value="Baterías">Baterías</option>
                        <option value="Herramientas">Herramientas</option>
                        <option value="Otros">Otros</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Cantidad</label>
                    <input type="number" id="vCantidad" min="1" value="1">
                </div>
                <button class="btn" type="submit">Agregar venta</button>
            </form>
            <p id="mensajeVentas"></p>
        </div>

        <h2>Historial de ventas</h2>
        <div id="listaVentas" class="ventas-lista"></div>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        const formVentas = document.getElementById("formVentas");
        const listaVentas = document.getElementById("listaVentas");
        const mensajeVentas = document.getElementById("mensajeVentas");

        const usuario = getSession();

        function mostrarVentas() {
            listaVentas.innerHTML = "";
            let ventas = JSON.parse(localStorage.getItem("ventasFM")) || [];
            ventas = ventas.filter(v => v.email === usuario.email);

            if (ventas.length === 0) {
                listaVentas.innerHTML = "<p>No hay ventas registradas.</p>";
                return;
            }

            ventas.forEach(v => {
                const div = document.createElement("div");
                div.classList.add("venta-item");
                div.innerHTML = `<strong>Producto:</strong> ${v.producto} | <strong>Cantidad:</strong> ${v.cantidad} | <strong>Fecha:</strong> ${v.fecha}`;
                listaVentas.appendChild(div);
            });
        }

        formVentas.addEventListener("submit", e => {
            e.preventDefault();
            const producto = document.getElementById("vProducto").value;
            const cantidad = parseInt(document.getElementById("vCantidad").value);

            if (!producto || cantidad < 1) {
                mensajeVentas.textContent = "Seleccione un producto y cantidad válida.";
                return;
            }

            let ventas = JSON.parse(localStorage.getItem("ventasFM")) || [];
            ventas.push({
                email: usuario.email,
                producto,
                cantidad,
                fecha: new Date().toLocaleString()
            });

            localStorage.setItem("ventasFM", JSON.stringify(ventas));
            mensajeVentas.textContent = "Venta registrada correctamente.";
            formVentas.reset();
            mostrarVentas();
        });

        // Mostrar historial al cargar
        mostrarVentas();
    </script>
</body>
</html>
